<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS System Dashboard</title>
    <link rel="stylesheet" href="pos-static.css">
</head>
<body>
    <div id="loginScreen" class="container login-container">
        <h2>POS System Login</h2>
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter username">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>
        <button class="btn" onclick="login()">Login</button>
        <div id="loginError" class="error"></div>
    </div>

    <div id="adminScreen" class="container" style="display: none;">
        <div class="admin-header">
            <h1>Admin Panel - Item Management</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="admin-grid">
            <div class="add-item-form">
                <h3>Add New Item</h3>
                <div class="form-group">
                    <label for="itemName">Item Name</label>
                    <input type="text" id="itemName" placeholder="Enter item name">
                </div>
                <div class="form-group">
                    <label for="itemPrice">Price (PHP)</label>
                    <input type="number" id="itemPrice" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label for="itemQuantity">Quantity</label>
                    <input type="number" id="itemQuantity" placeholder="0">
                </div>
                <button class="btn" onclick="addItem()">Add Item</button>
            </div>

            <div class="items-list">
                <div class="items-header">
                    <h3>Current Items</h3>
                    <input type="text" id="inventorySearch" placeholder="Search inventory...">
                </div>
                <div id="itemsGrid" class="item-grid"></div>
            </div>
        </div>

        <div class="admin-extra-grid">
            <div class="admin-card">
                <h3>Inventory & Sales Overview</h3>
                <div class="admin-stats" id="adminStats"></div>
            </div>
            <div class="admin-card">
                <div class="sales-report-header">
                    <h3>Sales Report (Latest)</h3>
                    <div class="sales-controls">
                        <div class="range-group">
                            <button class="secondary-btn active" data-range="today" onclick="setSalesRange('today')">Today</button>
                            <button class="secondary-btn" data-range="week" onclick="setSalesRange('week')">Week</button>
                            <button class="secondary-btn" data-range="month" onclick="setSalesRange('month')">Month</button>
                        </div>
                        <button class="secondary-btn" onclick="exportSalesCsv()">Export CSV</button>
                        <button class="secondary-btn" onclick="refreshAdminData()">Refresh</button>
                    </div>
                </div>
                <div id="salesReport" class="sales-report-table"></div>
            </div>
        </div>
    </div>

    <div id="posScreen" class="container" style="display: none;">
        <div class="pos-header">
            <h1>Point of Sale</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="pos-grid">
            <div class="items-section">
                <h3>Available Items</h3>
                <div id="posItemsGrid" class="items-grid"></div>
            </div>

            <div class="cart-section">
                <h3>Current Order</h3>
                <div id="cartItems"></div>
                <div id="cartTotal" class="cart-total">Total: PHP 0.00</div>
                <button class="process-btn" onclick="processSale()" id="processBtn" disabled>Process Sale</button>
            </div>
        </div>
    </div>

    <div id="receiptScreen" class="container" style="display: none;">
        <div id="receiptContent" class="receipt"></div>
        <button class="print-btn" onclick="window.print()">Print Receipt</button>
        <button class="back-btn" onclick="backToPOS()">Back to POS</button>
    </div>

    <div id="editItemModal" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <h3>Edit Item</h3>
            <div class="form-group">
                <label for="editItemName">Item Name</label>
                <input type="text" id="editItemName">
            </div>
            <div class="form-group">
                <label for="editItemPrice">Price (PHP)</label>
                <input type="number" id="editItemPrice" step="0.01">
            </div>
            <div class="form-group">
                <label for="editItemQuantity">Quantity</label>
                <input type="number" id="editItemQuantity" step="1">
            </div>
            <div class="modal-actions">
                <button class="secondary-btn" onclick="closeEditModal()">Cancel</button>
                <button class="btn" onclick="saveEditItem()">Save Changes</button>
            </div>
        </div>
    </div>

    <div id="saleDetailModal" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <div class="sales-report-header">
                <h3>Sale Details</h3>
                <button class="secondary-btn" onclick="closeSaleDetailModal()">Close</button>
            </div>
            <div id="saleDetailBody" class="sale-items-viewer"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="pos-static.js" defer></script>
</body>
</html>
